name: Build Docker Image and Deploy to ECS

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_PRIVATE_KEY }}
          script: |
            cd /opt/apple-refurb-monitor

            # 更新 docker-compose.yml（如果仓库里有修改）
            git fetch origin main
            git reset --hard origin/main

            # 登录 GitHub Container Registry（如果你的仓库是公开的，可以注释掉下面两行）
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 拉取最新镜像并重启容器
            export IMAGE_NAME=ghcr.io/${{ github.repository }}:latest
            docker compose -f docker-compose.nginx.yml pull
            docker compose -f docker-compose.nginx.yml up -d

            # 清理旧镜像，释放磁盘
            docker image prune -f
